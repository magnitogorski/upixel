    <!-- ==========================================================
         FORMULÁRIO DE CONTATO

         Usa o Web3Forms (web3forms.com) — serviço gratuito que
         envia o conteúdo do formulário direto pro seu e-mail,
         sem precisar de servidor, login ou cartão de crédito.

         COMO ATIVAR (leva ~2 minutos):
         1. Acesse https://web3forms.com
         2. Digite o seu e-mail e clique em "Create Access Key"
         3. Você vai receber uma chave (algo como
            "a1b2c3d4-e5f6-...") por e-mail
         4. Cole essa chave no lugar de
            "COLE_SUA_ACCESS_KEY_AQUI" logo abaixo
         5. Pronto — toda mensagem enviada nesse formulário
            vai cair direto na sua caixa de entrada.

         Enquanto você não configurar a chave, o formulário
         não vai enviar e-mail nenhum (mas continua funcionando
         visualmente).
         ========================================================== -->

    <form class="contato-form" action="https://api.web3forms.com/submit" method="POST">

        <input type="hidden" name="access_key" value="COLE_SUA_ACCESS_KEY_AQUI">
        <input type="hidden" name="subject" value="Nova mensagem pelo site Upixel">
        <input type="text" name="botcheck" style="display:none">

        <input type="text" name="nome" placeholder="Seu nome" required>

        <input type="email" name="email" placeholder="Seu e-mail" required>

        <input type="text" name="rede_social" placeholder="Seu LinkedIn, Instagram ou Facebook (opcional)">

        <textarea name="mensagem" placeholder="Sua mensagem" required></textarea>

        <button type="submit">Enviar mensagem</button>

    </form>
