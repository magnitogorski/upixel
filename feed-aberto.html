<!-- ==========================================================
     SCRIPT: FEED PAGINADO DE VÍDEOS
     id: #feed-paginado

     COMO EDITAR:
     1. Para adicionar, trocar ou remover um vídeo, mexa SÓ no
        array POSTS_FEED logo abaixo. Cada vídeo é um objeto
        { id, video, categoria, comentario }.
     2. O campo "id" é o que gera o link de compartilhamento
        (ex: feed-aberto.html#post-03). NUNCA mude o id de um
        vídeo que já foi compartilhado, senão o link antigo para
        de funcionar. Ao adicionar um vídeo novo, é só criar um
        id novo e único (post-08, post-09, ...).
     3. Se você ainda não tem vídeos suficientes, pode repetir
        o mesmo arquivo .mp4 em vários objetos — é só pra
        preencher o feed até você ter mais prontos.
     4. POSTS_POR_PAGINA controla quantos vídeos aparecem em
        cada página (o pedido foi 5).
     5. Nada mais neste script precisa ser alterado no dia a dia.
     ========================================================== -->

<script id="feed-paginado">

// ----------------------------------------------------------
// 1. DADOS DOS VÍDEOS (edite aqui para trocar o conteúdo)
// ----------------------------------------------------------
const POSTS_FEED = [
    {
        id: "post-01",
        video: "https://res.cloudinary.com/zaxtet3x/video/upload/v1784757497/amoEAXV_460sv_kv48tq.mp4",
        categoria: "User",
        comentario: "Quando o usuário resolve criar um caminho que não existia no protótipo. O designer..."
    },
    {
        id: "post-02",
        video: "https://res.cloudinary.com/zaxtet3x/video/upload/v1784762078/aqyqGzp_460sv_hchmrb.mp4",
        categoria: "UX",
        comentario: "Quando ignoramos o teste de usabilidade e lançamos o produto."
    },
    {
        id: "post-03",
        video: "https://res.cloudinary.com/zaxtet3x/video/upload/v1784762695/aLnyvnA_460sv_s9asok.mp4",
        categoria: "COMPORTAMENTO",
        comentario: "Não precisamos mais desses designers... Deixa que eu desenho o protótipo."
    },
    {
        id: "post-04",
        video: "https://res.cloudinary.com/zaxtet3x/video/upload/v1784762940/a0e249L_460sv_t5ivry.mp4",
        categoria: "UI DESIGN",
        comentario: "Meuuu é fácinho usar essa plataforma. Deixa eu te mostrar como faz!"
    },
    {
        id: "post-05",
        video: "https://res.cloudinary.com/zaxtet3x/video/upload/v1784763140/ae9vgdW_460sv_byrkq8.mp4",
        categoria: "compricado",
        comentario: "Digo Bóra que tem post novo nesse upixel"
    },
    {
        id: "post-06",
        video: "https://res.cloudinary.com/zaxtet3x/video/upload/v1784766804/teste_xlkvo3.mp4",
        categoria: "COMPORTAMENTO",
        comentario: "Repare em quantas vezes você abre um app só pra 'dar uma olhada rápida'."
    },
    {
        id: "post-07",
        video: "https://res.cloudinary.com/zaxtet3x/video/upload/v1784763388/a5Q81or_460sv_mxudzf.mp4",
        categoria: "Responsivo",
        comentario: "A interface é completamente flexível e responsiva."
    }
];

// ----------------------------------------------------------
// 2. CONFIGURAÇÃO GERAL
// ----------------------------------------------------------
const POSTS_POR_PAGINA = 5;
let paginaAtual = 1;

// URL base da página (usada para montar o link de cada vídeo)
const URL_BASE = window.location.origin + window.location.pathname;

const listaPosts = document.getElementById("lista-posts");
const paginacaoFeed = document.getElementById("paginacao-feed");
const avisoCopiado = document.getElementById("aviso-copiado");

// ----------------------------------------------------------
// 3. MONTA O HTML DE UM POST
//    Ordem: vídeo > comentário Upixel > ícones
// ----------------------------------------------------------
function criarHtmlPost(post) {
    return `
        <article class="post-video" id="${post.id}">

            <div class="midia-principal">
                <img class="logo-sobre-midia" src="logosolitaria.png" alt="Upixel">
                <span class="tag-formato">vídeo</span>
                <video src="${post.video}" muted autoplay loop playsinline>
                    Seu navegador não suporta vídeo em HTML5.
                </video>
            </div>

            <section class="comentario-upixel">
                <div class="titulo-comentario">
                    <img src="logosolitaria.png" alt="Upixel">
                    <h2>Comentário Upixel</h2>
                </div>
                <p>${post.comentario}</p>
            </section>

            <div class="meta-feed">

                <span class="categoria-feed">${post.categoria}</span>

                <div class="compartilhar-mini">

                    <a href="#" title="Compartilhar no LinkedIn" data-acao="linkedin" data-post-id="${post.id}">
                        <img src="linkedin-161-svgrepo-com.svg" alt="LinkedIn">
                    </a>


                    <button title="Copiar link" data-acao="copiar" data-post-id="${post.id}">
                        <img src="Copy.svg" alt="Copiar link">
                    </button>

                </div>

            </div>

        </article>
    `;
}

// ----------------------------------------------------------
// 4. RENDERIZA OS POSTS DA PÁGINA ATUAL
// ----------------------------------------------------------
function renderizarPosts() {
    const inicio = (paginaAtual - 1) * POSTS_POR_PAGINA;
    const fim = inicio + POSTS_POR_PAGINA;
    const postsDaPagina = POSTS_FEED.slice(inicio, fim);

    listaPosts.innerHTML = postsDaPagina.map(criarHtmlPost).join("");
}

// ----------------------------------------------------------
// 5. RENDERIZA OS BOTÕES DE PAGINAÇÃO
// ----------------------------------------------------------
function renderizarPaginacao() {
    const totalPaginas = Math.ceil(POSTS_FEED.length / POSTS_POR_PAGINA);

    if (totalPaginas <= 1) {
        paginacaoFeed.innerHTML = "";
        return;
    }

    let html = "";

    html += `<button ${paginaAtual === 1 ? "disabled" : ""} data-pagina="anterior">‹ Anterior</button>`;

    for (let i = 1; i <= totalPaginas; i++) {
        html += `<button class="${i === paginaAtual ? "pagina-ativa" : ""}" data-pagina="${i}">${i}</button>`;
    }

    html += `<button ${paginaAtual === totalPaginas ? "disabled" : ""} data-pagina="proxima">Próxima ›</button>`;

    paginacaoFeed.innerHTML = html;
}

// ----------------------------------------------------------
// 6. TROCA DE PÁGINA (clique nos botões)
// ----------------------------------------------------------
paginacaoFeed.addEventListener("click", function (evento) {
    const botao = evento.target.closest("button");
    if (!botao) return;

    const totalPaginas = Math.ceil(POSTS_FEED.length / POSTS_POR_PAGINA);
    const alvo = botao.dataset.pagina;

    if (alvo === "anterior") {
        paginaAtual = Math.max(1, paginaAtual - 1);
    } else if (alvo === "proxima") {
        paginaAtual = Math.min(totalPaginas, paginaAtual + 1);
    } else {
        paginaAtual = Number(alvo);
    }

    renderizarPosts();
    renderizarPaginacao();

    document.querySelector(".pagina-feed-aberto").scrollIntoView({ behavior: "smooth", block: "start" });
});

// ----------------------------------------------------------
// 7. COMPARTILHAMENTO (Copiar link e LinkedIn)
//
//    Delegação de evento: como os posts são recriados a cada
//    troca de página, o clique é "escutado" no container pai
//    (#lista-posts), e não em cada botão individualmente.
// ----------------------------------------------------------
function mostrarAvisoCopiado() {
    avisoCopiado.style.opacity = "1";
    avisoCopiado.style.transform = "translateX(-50%) translateY(0)";
    clearTimeout(mostrarAvisoCopiado._timer);
    mostrarAvisoCopiado._timer = setTimeout(() => {
        avisoCopiado.style.opacity = "0";
        avisoCopiado.style.transform = "translateX(-50%) translateY(20px)";
    }, 2200);
}

function copiarTexto(texto) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(texto);
    }
    // Fallback para navegadores/contextos sem Clipboard API
    const area = document.createElement("textarea");
    area.value = texto;
    area.style.position = "fixed";
    area.style.opacity = "0";
    document.body.appendChild(area);
    area.select();
    document.execCommand("copy");
    document.body.removeChild(area);
    return Promise.resolve();
}

listaPosts.addEventListener("click", function (evento) {
    const elemento = evento.target.closest("[data-acao]");
    if (!elemento) return;

    evento.preventDefault();

    const postId = elemento.dataset.postId;
    const linkDoVideo = `${URL_BASE}#${postId}`;

    if (elemento.dataset.acao === "copiar") {
        const textoParaCompartilhar = `Vi isso no Upixel 👀 ${linkDoVideo}`;

        copiarTexto(textoParaCompartilhar).then(() => {
            mostrarAvisoCopiado();

            // feedback visual rápido no próprio botão
            elemento.classList.add("copiado");
            setTimeout(() => elemento.classList.remove("copiado"), 1500);
        });
    }

    if (elemento.dataset.acao === "linkedin") {
        // Compartilhamento oficial do LinkedIn: ele usa as tags
        // Open Graph da própria página para montar a prévia.
        // Não é possível enviar um texto customizado por aqui —
        // o LinkedIn removeu esse parâmetro em 2020.
        const urlCompartilhamento =
            "https://www.linkedin.com/sharing/share-offsite/?url=" +
            encodeURIComponent(linkDoVideo);

        window.open(urlCompartilhamento, "_blank", "noopener,noreferrer,width=600,height=600");
    }
});

// ----------------------------------------------------------
// 8. ABRIR DIRETO NO VÍDEO COMPARTILHADO (via #post-XX na URL)
// ----------------------------------------------------------
function abrirPostDoLink() {
    const hash = window.location.hash.replace("#", "");
    if (!hash) return;

    const indice = POSTS_FEED.findIndex((post) => post.id === hash);
    if (indice === -1) return;

    paginaAtual = Math.floor(indice / POSTS_POR_PAGINA) + 1;
    renderizarPosts();
    renderizarPaginacao();

    // pequena espera pro DOM terminar de montar antes de rolar até o post
    setTimeout(() => {
        const elementoPost = document.getElementById(hash);
        if (!elementoPost) return;
        elementoPost.scrollIntoView({ behavior: "smooth", block: "center" });
        elementoPost.classList.add("post-destacado");
        setTimeout(() => elementoPost.classList.remove("post-destacado"), 2500);
    }, 50);
}

// ----------------------------------------------------------
// 9. INICIALIZA O FEED
// ----------------------------------------------------------
renderizarPosts();
renderizarPaginacao();
abrirPostDoLink();

</script>
